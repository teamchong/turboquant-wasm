name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'turboquant/**'
      - '.github/workflows/**'
      - '.gitignore'
  pull_request:
    paths:
      - 'turboquant/**'
      - '.github/workflows/**'
      - '.gitignore'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-latest
            target: aarch64-macos
          - os: windows-latest
            target: x86_64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Format Check
        working-directory: turboquant
        run: zig fmt --check src/

      - name: Run Tests
        working-directory: turboquant
        run: zig test src/turboquant.zig -target ${{ matrix.target }}
